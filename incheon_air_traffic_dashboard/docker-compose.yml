services:
  postgres:
    image: postgres:16-alpine
    container_name: air_traffic_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5433}:5432"   # 호스트에서 직접 접속/백업하고 싶을 때만 사용, 불필요하면 제거 가능
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [air_net]

  backend:
    build: ./backend
    container_name: air_traffic_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./data:/data       # ETL 원본 엑셀 + 웹 업로드 파일 보관(/data/uploads) — 쓰기 필요
    ports:
      - "${BACKEND_PORT:-8010}:8000"   # 디버깅용 직접 노출(불필요하면 제거 가능)
    networks: [air_net]

  frontend:
    build: ./frontend
    container_name: air_traffic_frontend
    restart: unless-stopped
    environment:
      BACKEND_URL: http://backend:8000
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-8501}:8501"   # 로컬 확인용 (터널은 sielain_net 내부 DNS로 직접 접근)
    networks:
      - air_net
      - sielain_net   # 기존 cloudflared 터널(sielain_tunnel)이 air_traffic_frontend:8501 로 접근하는 공유 네트워크

volumes:
  pgdata:

networks:
  air_net:
    driver: bridge
  sielain_net:
    external: true
    name: docker_sielain_net   # /Users/sielain/docker 스택(sielain_tunnel 포함)이 만든 기존 네트워크
