services:
  postgres:
    image: postgres:16-alpine
    container_name: air_traffic_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5433}:5432"   # 호스트에서 직접 접속/백업하고 싶을 때만 사용, 불필요하면 제거 가능
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [air_net]

  backend:
    build: ./backend
    container_name: air_traffic_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./data:/data:ro    # ETL이 읽을 원본 엑셀 파일 위치
    ports:
      - "${BACKEND_PORT:-8010}:8000"   # 디버깅용 직접 노출(불필요하면 제거 가능)
    networks: [air_net]

  frontend:
    build: ./frontend
    container_name: air_traffic_frontend
    restart: unless-stopped
    environment:
      BACKEND_URL: http://backend:8000
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-8501}:8501"   # Cloudflare Tunnel이 localhost:8501 로 프록시
    networks: [air_net]

volumes:
  pgdata:

networks:
  air_net:
    driver: bridge
