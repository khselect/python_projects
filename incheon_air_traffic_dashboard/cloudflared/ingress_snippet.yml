# ------------------------------------------------------------------
# ⚠️ 이 파일의 config.yml ingress 방식은 현재 환경에 적용되지 않습니다.
#
# 맥미니의 cloudflared(sielain_tunnel 컨테이너)는 TUNNEL_TOKEN 환경변수로
# 기동하는 "원격 관리형(remotely-managed)" 터널이라 로컬 config.yml의
# ingress 규칙이 무시됩니다. (parts.sielain.com 배포 때 확인된 사항 —
# /Users/sielain/docker/CLAUDE.md 참고)
#
# ── air.sielain.com 라우팅 등록 절차 (Cloudflare 대시보드) ──────────
#
# 1) 사전 조건: frontend 컨테이너가 터널과 같은 Docker 네트워크에 연결
#    (docker-compose.yml 의 frontend.networks 에 sielain_net(external,
#     name: docker_sielain_net) 추가됨 — docker compose up 시 자동 연결)
#
# 2) Cloudflare Zero Trust 대시보드에서:
#    Networks → Tunnels → sielain-tunnel → Published application routes
#    → Add a published application route
#       Subdomain : air
#       Domain    : sielain.com
#       Type      : HTTP
#       URL       : air_traffic_frontend:8501
#    저장하면 DNS CNAME(air.sielain.com → <터널ID>.cfargotunnel.com)이
#    자동 생성됩니다. 별도의 `cloudflared tunnel route dns` 불필요.
#
#    ※ "Hostname routes (Beta)" 탭은 WARP 전용 사설 라우트 — 사용 금지.
#
# 3) 확인: https://air.sielain.com 접속 (터널 재시작 불필요, 즉시 반영)
#
# ── 참고: 로컬 관리형(config.yml) 터널로 전환하는 경우의 규칙 예시 ──
# ingress:
#   - hostname: air.sielain.com
#     service: http://air_traffic_frontend:8501   # 같은 Docker 네트워크 기준
#   - hostname: parts.sielain.com
#     service: http://parts-app:8000
#   - service: http_status:404
# ------------------------------------------------------------------
